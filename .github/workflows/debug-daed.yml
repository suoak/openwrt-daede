name: Debug daed build

# Strict single-arch build that uploads OpenWrt build logs so failures are
# diagnosable (test-daed-build hides the real error without V=s).

on:
  workflow_dispatch:
    inputs:
      packages:
        description: Packages to build
        default: "daed"
      arch:
        description: Arch
        default: "x86_64"
      sdk:
        description: SDK version
        default: "25.12"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build (strict)
        uses: kenzok8/gh-action-sdk@hash
        env:
          CONTAINER: immortalwrt/sdk
          ARCH: ${{ github.event.inputs.arch }}-openwrt-${{ github.event.inputs.sdk }}
          FEEDNAME: daede
          PACKAGES: ${{ github.event.inputs.packages }}
          EXTRA_FEEDS: src-git|wall|https://github.com/kenzok8/wall
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: false
          INDEX: 1
          KEY_BUILD: ${{ secrets.OPKG_KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          GOLANG_REPO: https://github.com/kenzok8/golang
          GOLANG_BRANCH: '1.26'

      - name: List output
        if: always()
        run: |
          ls -la bin/packages/${{ github.event.inputs.arch }}/daede/ 2>/dev/null || echo "no pkg dir"
          find . -name '*.log' 2>/dev/null | head -50

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: debug-${{ github.event.inputs.arch }}-${{ github.event.inputs.sdk }}
          path: |
            bin/packages/${{ github.event.inputs.arch }}/daede/*.apk
            logs/**
            *.log
            **/*.log
          if-no-files-found: warn
